<!DOCTYPE html>
<html>
<head>
    <title>Token System</title>
</head>

<body>

<h1>Current Token: {{ current_token }}</h1>

<!-- ADD PATIENT -->
<form action="/add" method="POST">
    <input type="text" name="name" placeholder="Patient Name" required>
    <input type="text" name="phone" placeholder="Phone Number" required>
    <button type="submit">Add Patient</button>
</form>

<br>

<!-- START AUTO SYSTEM -->
<button onclick="startAuto()">Start Auto Call</button>

<br><br>

<h2>Patients List:</h2>

<ul>
{% for p in patients %}
    <li>
        {{ p.name }} - Token {{ p.token }}

        <a href="/call/{{ p.token }}">Call Now</a>

        <a href="/delete/{{ p.token }}">Remove</a>
    </li>
{% endfor %}
</ul>

<!-- 🔥 AUTO CALL + RETRY JS -->
<script>

let autoRunning = false;

function startAuto() {
    autoRunning = true;
    console.log("AUTO SYSTEM STARTED 🔥");
}

// har 20 sec me auto_call chalega
setInterval(() => {

    if (!autoRunning) return;

    console.log("AUTO CALL RUNNING...");

    fetch("/auto_call")
    .then(() => {
        location.reload();
    })
    .catch(err => {
        console.log("Error:", err);
    });

}, 20000);

</script>

</body>
</html>
