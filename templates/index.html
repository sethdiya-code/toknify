<!DOCTYPE html>
<html>
<head>
    <title>Token System</title>
</head>

<body>

<h1>Current Token: {{ current_token }}</h1>

<form action="/add" method="POST">
    <input type="text" name="name" placeholder="Patient Name" required>
    <input type="text" name="phone" placeholder="Phone Number" required>
    <button type="submit">Add Patient</button>
</form>

<br>

<button onclick="startAuto()">Start Auto Call</button>
<button onclick="stopAuto()">Stop</button>

<h2>Patients List:</h2>

<ul>
{% for p in patients %}
<li>
    {{ p.name }} - Token {{ p.token }}
    <a href="/delete/{{ p.token }}">❌ Remove</a>
</li>
{% endfor %}
</ul>

<script>
let running = false;

function startAuto() {
    running = true;
    fetch("/start_auto");
}

function stopAuto() {
    running = false;
    fetch("/stop_auto");
}

setInterval(() => {
    if (!running) return;

    fetch("/auto_call")
    .then(res => res.text())
    .then(data => console.log(data));

}, 5000);
</script>

</body>
</html>
