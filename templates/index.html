<!DOCTYPE html>
<html>
<head>
    <title>Token System</title>
</head>

<body>

<h1>Current Token: {{ current_token }}</h1>

<!-- ➕ ADD PATIENT -->
<form action="/add" method="POST">
    <input type="text" name="name" placeholder="Patient Name" required>
    <input type="text" name="phone" placeholder="Phone Number" required>
    <button type="submit">Add Patient</button>
</form>

<br>

<!-- 🚀 CONTROL BUTTONS -->
<button onclick="startAuto()">🚀 Start Auto Call</button>
<button onclick="stopAuto()">⛔ Stop</button>

<br><br>

<h2>Patients List:</h2>

<ul>
{% for p in patients %}
<li>
    {{ p.name }} - Token {{ p.token }}

    <a href="/call/{{ p.token }}">📞 Call Now</a>
    <a href="/delete/{{ p.token }}">❌ Remove</a>
</li>
{% endfor %}
</ul>

<!-- 🔥 AUTO SYSTEM SCRIPT -->
<script>
let autoRunning = false;

function startAuto() {
    autoRunning = true;
    fetch("/start_auto");
    console.log("AUTO STARTED");
}

function stopAuto() {
    autoRunning = false;
    fetch("/stop_auto");
    console.log("AUTO STOPPED");
}

setInterval(() => {
    if (!autoRunning) return;

    fetch("/auto_call")
        .then(res => res.text())
        .then(data => {
            console.log("AUTO:", data);
            // ❌ page reload hata diya
        })
        .catch(err => {
            console.log("Error:", err);
        });

}, 10000);
</script>
    
</body>
</html>
