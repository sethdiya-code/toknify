<!DOCTYPE html>
<html>
<head>
    <title>Toknify</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        input {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .active {
            background-color: green;
            color: white;
        }

        .call-btn {
            background-color: green;
            color: white;
        }

        .remove-btn {
            color: red;
            text-decoration: none;
            margin-left: 10px;
        }
    </style>

    <script>
        function setCallBefore(value) {
            fetch('/set_call_before/' + value)
            .then(() => {
                location.reload();
            });
        }
    </script>

</head>

<body>

    <h1>Current Token: {{ current_token }}</h1>

    <!-- ADD PATIENT -->
    <form action="/add" method="POST">
        <input type="text" name="name" placeholder="Patient Name" required>
        <input type="text" name="phone" placeholder="Phone Number" required>
        <button type="submit">Add Patient</button>
    </form>

    <!-- AUTO CALL -->
    <a href="/start"><button>Start Auto Call</button></a>
    <a href="/stop"><button>Stop</button></a>

    <!-- CALL BEFORE -->
    <h3>Call Before Tokens:</h3>

    <button onclick="setCallBefore(1)" class="{{ 'active' if call_before==1 else '' }}">1</button>
    <button onclick="setCallBefore(2)" class="{{ 'active' if call_before==2 else '' }}">2</button>
    <button onclick="setCallBefore(3)" class="{{ 'active' if call_before==3 else '' }}">3</button>
    <button onclick="setCallBefore(4)" class="{{ 'active' if call_before==4 else '' }}">4</button>

    <p><b>Current:</b> {{ call_before }} tokens before</p>

    <hr>

    <!-- PATIENT LIST -->
    <h2>Patients List:</h2>

    <ul>
        {% for p in patients %}
        <li>
            {{ p.name }} - Token {{ p.token }}

            <!-- CALL NOW -->
            <a href="/call_now/{{ p.token }}">
                <button class="call-btn">📞 Call Now</button>
            </a>

            <!-- REMOVE -->
            <a href="/delete/{{ p.token }}" class="remove-btn">❌ Remove</a>
        </li>
        {% endfor %}
    </ul>

</body>
</html>
