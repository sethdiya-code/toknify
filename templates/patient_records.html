<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call History</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f5f6fa;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 92%;
            max-width: 1000px;
            margin: 40px auto;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        h1 {
            margin-top: 0;
            color: #2d2d2d;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }

        th {
            background: #f3efff;
            color: #333;
            padding: 14px;
            text-align: left;
            font-size: 15px;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        tr:hover {
            background: #faf9ff;
        }

        .empty {
            margin-top: 30px;
            text-align: center;
            color: #777;
            font-size: 15px;
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            background: linear-gradient(to right, #4a4dff, #7a2be2);
            color: white;
            padding: 12px 22px;
            border-radius: 10px;
            font-weight: bold;
        }

        .back-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="box">

        <h1>📞 Call History</h1>

        {% if history %}

        <table>
            <thead>
                <tr>
                    <th>Patient Name</th>
                    <th>Phone Number</th>
                    <th>Token Number</th>
                </tr>
            </thead>

            <tbody>
                {% for item in history %}
                <tr>
                    <td>{{ item[0] }}</td>
                    <td>{{ item[1] }}</td>
                    <td>{{ item[2] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        {% else %}

        <div class="empty">
            No call history found.
        </div>

        {% endif %}

        <a href="/" class="back-btn">← Back to Dashboard</a>

    </div>
</div>

</body>
</html>
