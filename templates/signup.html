<!DOCTYPE html>
<html>
<head>
    <title>Toknify Signup</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6a5acd, #7b68ee);
        }

        .card {
            background: white;
            padding: 35px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            border-color: #6a5acd;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #6a5acd, #7b68ee);
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.03);
        }

        .link {
            margin-top: 15px;
            font-size: 13px;
            color: #555;
        }

        .link a {
            color: #6a5acd;
            text-decoration: none;
            font-weight: 500;
        }

        .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>📝 Toknify Signup</h2>

        <form method="POST">
            <input type="email" name="email" placeholder="Enter Email" required>
            <input type="password" name="password" placeholder="Create Password" required>

            <button type="submit">Create Account</button>
        </form>

        <div class="link">
            Already have an account? 
            <a href="/login">Login</a>
        </div>
    </div>

</body>
</html>
