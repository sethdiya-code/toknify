<!DOCTYPE html>
<html>
<head>
    <title>Signup - Toknify</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .signup-box {
            background: white;
            padding: 40px;
            width: 420px;
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        h1 {
            margin: 0;
            color: #4b2aad;
            font-size: 30px;
            font-weight: 700;
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #6a4cff;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #5b3df5;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #4b2aad;
        }

        .login-link {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
        }

        .login-link a {
            color: #5b3df5;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="signup-box">

    <h1>Toknify</h1>
    <p>Create your dashboard account</p>

    <form action="{% if edit_mode %}/edit_profile{% else %}/signup{% endif %}" method="POST">

    <input
        type="text"
        name="organization_name"
        value="{{ organization_name if edit_mode else '' }}"
        placeholder="Organization Name"
        required
    >

    <input
        type="text"
        name="admin_name"
        value="{{ admin_name if edit_mode else '' }}"
        placeholder="Admin Name"
        required
    >

    <input
        type="email"
        name="email"
        value="{{ email if edit_mode else '' }}"
        placeholder="Email Address"
        required
    >

    <input
        type="password"
        name="password"
        value="{{ password if edit_mode else '' }}"
        placeholder="Password"
        required
    >

    <button type="submit">
        {% if edit_mode %}
            Update Profile
        {% else %}
            Create Account
        {% endif %}
    </button>

</form>

    <div class="login-link">
        Already have account?
        <a href="/login">Login</a>
    </div>

</div>

</body>
</html>
