<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Support</title>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f7fb;
}

.container{
    width:80%;
    margin:50px auto;
    background:#fff;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

h1{
    color:#1f2d3d;
    margin-bottom:25px;
}

.support-card{
    background:#f8faff;
    border:1px solid #e6ecff;
    padding:25px;
    border-radius:15px;
    font-size:16px;
    line-height:1.8;
}

.back-btn{
    display:inline-block;
    margin-top:25px;
    background:#2457ff;
    color:white;
    text-decoration:none;
    padding:14px 28px;
    border-radius:12px;
    font-weight:600;
}

.back-btn:hover{
    background:#1747e0;
}
</style>
</head>
<body>

<div class="container">
    <h1>💬 Support</h1>

    <div class="support-card">
        <strong>Support Contact</strong><br><br>

        📧 Email: support@toknify.in <br>
        🕒 Available: Mon–Sat | 10 AM – 7 PM
    </div>

    <a href="/" class="back-btn">← Back to Dashboard</a>
</div>

</body>
</html>
