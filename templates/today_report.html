<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Report</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f5f6fa;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: 40px auto;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        h1 {
            margin-top: 0;
            color: #2d2d2d;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: #f8f7ff;
            padding: 25px;
            border-radius: 14px;
            text-align: center;
        }

        .card h2 {
            margin: 0;
            font-size: 34px;
            color: #5b2be0;
        }

        .card p {
            margin-top: 10px;
            font-size: 15px;
            color: #555;
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            background: linear-gradient(to right, #4a4dff, #7a2be2);
            color: white;
            padding: 12px 22px;
            border-radius: 10px;
            font-weight: bold;
        }

        .back-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="box">

        <h1>📊 Today's Report</h1>

        <div class="stats">

            <div class="card">
                <h2>{{ total }}</h2>
                <p>Total Patients</p>
            </div>

            <div class="card">
                <h2>{{ completed }}</h2>
                <p>Completed Calls</p>
            </div>

            <div class="card">
                <h2>{{ waiting }}</h2>
                <p>Waiting Patients</p>
            </div>

        </div>

        <a href="/" class="back-btn">← Back to Dashboard</a>

    </div>
</div>

</body>
</html>
